<!DOCTYPE html>
<html lang="en">
  <head> <!--chứa cấu hình không hiển thị-->
    <link rel="stylesheet" href="../src/css/navbar.css">
  </head>

  <!--Chứa nội dung sẽ hiển thị của trang web-->
  <body>
    <div id="navbar">
      <script>
        fetch("../src/navbar.js")
          .then((response) => response.text())
          .then((data) => {
          document.getElementById("navbar").innerHTML = data;
        });
      </script>
        
    </div>"
    
  </body>
</html>
